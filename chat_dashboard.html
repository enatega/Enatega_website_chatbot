<!DOCTYPE html>
<html>
<head>
    <title>Enatega Chat Analytics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #f5f5f5; padding: 20px; border-radius: 8px; flex: 1; }
        .sessions { background: white; border: 1px solid #ddd; border-radius: 8px; }
        .session { border-bottom: 1px solid #eee; padding: 15px; }
        .session:last-child { border-bottom: none; }
        .message { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .user { background: #e3f2fd; }
        .assistant { background: #f3e5f5; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .timestamp { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Enatega Chat Analytics</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Sessions</h3>
                <div id="totalSessions">Loading...</div>
            </div>
            <div class="stat-card">
                <h3>Total Messages</h3>
                <div id="totalMessages">Loading...</div>
            </div>
            <div class="stat-card">
                <h3>Last Activity</h3>
                <div id="lastActivity">Loading...</div>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <button onclick="loadData()">🔄 Refresh Data</button>
            <button onclick="exportData()">📥 Export JSON</button>
        </div>

        <div class="sessions" id="sessionsContainer">
            Loading sessions...
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        
        async function loadData() {
            try {
                // Load sessions list
                const sessionsResponse = await fetch(`${API_BASE}/sessions`);
                const sessions = await sessionsResponse.json();
                
                // Update stats
                document.getElementById('totalSessions').textContent = sessions.length;
                
                let totalMessages = 0;
                let lastActivity = null;
                
                // Load detailed session data
                const sessionsContainer = document.getElementById('sessionsContainer');
                sessionsContainer.innerHTML = '<div style="padding: 20px;">Loading session details...</div>';
                
                const sessionDetails = [];
                for (const session of sessions.slice(0, 10)) { // Limit to 10 most recent
                    try {
                        const detailResponse = await fetch(`${API_BASE}/session/${session.session_id}`);
                        const detail = await detailResponse.json();
                        if (detail.messages) {
                            totalMessages += detail.messages.length;
                            sessionDetails.push(detail);
                        }
                        if (session.last_active && (!lastActivity || new Date(session.last_active) > new Date(lastActivity))) {
                            lastActivity = session.last_active;
                        }
                    } catch (e) {
                        console.error('Error loading session:', session.session_id, e);
                    }
                }
                
                // Update stats
                document.getElementById('totalMessages').textContent = totalMessages;
                document.getElementById('lastActivity').textContent = lastActivity ? 
                    new Date(lastActivity).toLocaleString() : 'No activity';
                
                // Render sessions
                renderSessions(sessionDetails);
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('sessionsContainer').innerHTML = 
                    '<div style="padding: 20px; color: red;">Error loading data. Make sure API is running on port 8000.</div>';
            }
        }
        
        function renderSessions(sessions) {
            const container = document.getElementById('sessionsContainer');
            
            if (sessions.length === 0) {
                container.innerHTML = '<div style="padding: 20px;">No chat sessions found.</div>';
                return;
            }
            
            const html = sessions.map(session => `
                <div class="session">
                    <h3>Session: ${session.session_id}</h3>
                    <div class="timestamp">Started: ${new Date(session.started_at).toLocaleString()}</div>
                    <div class="timestamp">Last Active: ${new Date(session.last_active).toLocaleString()}</div>
                    ${session.page_urls ? `<div class="timestamp">Pages: ${session.page_urls.join(', ')}</div>` : ''}
                    
                    <div style="margin-top: 15px;">
                        ${(session.messages || []).map(msg => `
                            <div class="message ${msg.role}">
                                <strong>${msg.role === 'user' ? '👤 User' : '🤖 Assistant'}:</strong>
                                <div>${msg.html}</div>
                                <div class="timestamp">${new Date(msg.ts).toLocaleString()}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        async function exportData() {
            try {
                const response = await fetch(`${API_BASE}/sessions`);
                const data = await response.json();
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `enatega-chat-data-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                alert('Error exporting data: ' + error.message);
            }
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
